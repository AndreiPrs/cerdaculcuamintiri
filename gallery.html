<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Galerie - Cerdacul cu Amintiri</title>
  <link rel="stylesheet" href="assets/style.css">
  <link href="https://fonts.cdnfonts.com/css/arhaic-romanesc" rel="stylesheet">
  <style>
    h1, h2, nav a {
      font-family: 'Arhaic Romanesc', serif !important;
    }
    .room-section-columns {
      display: flex;
      flex-wrap: wrap;
      gap: 2em;
      justify-content: center;
    }
    .room-section-columns > section {
      flex: 1 1 350px;
      min-width: 300px;
      max-width: 450px;
    }
  </style>
</head>
<body>
  <div id="mainpage-slider-placeholder"></div>
  <header style="position:fixed; top:24px; left:50%; transform:translateX(-50%); z-index:10; background:rgba(38,50,56,0.85); border-radius:32px; box-shadow:0 4px 24px rgba(0,0,0,0.12); padding:0.5em 2em;">
    <nav>
      <ul style="display:flex; gap:2em; align-items:center; margin:0; padding:0;">
        <li><a href="index.html">Acasă</a></li>
        <li><a href="about.html">Despre</a></li>
        <li><a href="gallery.html">Galerie</a></li>
        <li><a href="reservation.html">Rezervare</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>
  <main style="position:relative; z-index:2; margin-top:12vh; display:flex; justify-content:center;">
    <div style="background:rgba(255,255,255,0.95); border-radius:16px; box-shadow:0 4px 24px rgba(0,0,0,0.12); padding:2em 2em; max-width:900px; width:100%;">
      <h1>Galerie camere</h1>
      <div style="display:flex; flex-direction:column; align-items:center; width:100%;">
        <h2 style="text-align:center; margin-bottom:0.5em;">Parter</h2>
        <div class="room-section-columns" id="parter-gallery" style="justify-content:center; width:100%;"></div>
        <h2 style="text-align:center; margin-top:2em; margin-bottom:0.5em;">Etaj</h2>
        <div class="room-section-columns" id="etaj-gallery" style="justify-content:center; width:100%;"></div>
      </div>
      <script src="assets/gallery.js"></script>
    </div>
  </main>
  <script src="assets/mainpage-slider.js"></script>
</body>
</html>

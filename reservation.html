<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Rezervare - Cerdacul cu Amintiri</title>
  <link rel="stylesheet" href="assets/style.css">
  <link href="https://fonts.cdnfonts.com/css/arhaic-romanesc" rel="stylesheet">
  <style>
    h1, h2, nav a {
      font-family: 'Arhaic Romanesc', serif !important;
    }
  </style>
</head>
<body>
  <div id="mainpage-slider-placeholder"></div>
  <header style="position:fixed; top:24px; left:50%; transform:translateX(-50%); z-index:10; background:rgba(38,50,56,0.85); border-radius:32px; box-shadow:0 4px 24px rgba(0,0,0,0.12); padding:0.5em 2em;">
    <nav>
      <ul style="display:flex; gap:2em; align-items:center; margin:0; padding:0;">
        <li><a href="index.html">Acasă</a></li>
        <li><a href="about.html">Despre</a></li>
        <li><a href="gallery.html">Galerie</a></li>
        <li><a href="reservation.html">Rezervare</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>
  <main style="position:relative; z-index:2; margin-top:12vh; display:flex; justify-content:center;">
    <div style="background:rgba(255,255,255,0.95); border-radius:16px; box-shadow:0 4px 24px rgba(0,0,0,0.12); padding:2em 2em; max-width:600px; width:100%;">
      <h1>Rezervare</h1>
      <form action="https://formspree.io/f/mdawbwge" method="POST">
        <label for="date">Data sosirii:</label>
        <input type="date" id="date" name="date" required>
        <label for="departure">Data plecării:</label>
        <input type="date" id="departure" name="departure" required>
        <label for="people">Număr persoane:</label>
        <input type="number" id="people" name="people" min="1" required>
        <label for="email">Adresă email:</label>
        <input type="email" id="email" name="email" required>
        <label for="phone">Telefon:</label>
        <input type="tel" id="phone" name="phone" required>
        <label for="captcha">Rezolvați: <span id="captcha-question"></span></label>
        <input type="text" id="captcha" name="captcha" required autocomplete="off">
        <button type="submit">Trimite rezervarea</button>
      </form>
      <p style="margin-top:1em;">Cererea va fi trimisă pe adresa de e-mail a proprietății.</p>
      <p style="font-size:0.9em;color:#888;">*Rezervarea nu este garantată până la o confirmare ulterioară.</p>
    </div>
  </main>
  <script src="assets/reservation-validation.js"></script>
  <script src="assets/mainpage-slider.js"></script>
</body>
</html>
